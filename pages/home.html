<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraqueList | Meus Jogadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --cor-fundo: #060d0a;
            --cor-form: #0e1512;
            --cor-borda: rgba(46, 204, 113, 0.2);
            --cor-input-bg: rgba(255, 255, 255, 0.06);
            --cor-texto: #ffffff;
            --cor-texto-muted: rgba(255, 255, 255, 0.35);
            --verde: #2ecc71;
            --verde-hover: #27ae60;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .navbar-custom {
            background-color: var(--cor-form);
            border-bottom: 1px solid var(--cor-borda);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--verde) !important;
            font-size: 1.5rem;
        }

        .nav-link {
            color: var(--cor-texto-muted) !important;
            margin: 0 0.5rem;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--verde) !important;
        }

        .btn-logout {
            background: linear-gradient(to left, var(--verde), var(--cor-form));
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: linear-gradient(to left, var(--verde-hover), var(--cor-form));
            color: var(--cor-texto);
        }

        /* CARROSSEL */
        .carousel-section {
            margin: 3rem 0;
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
            padding: 2rem;
        }

        .carousel-item {
            height: 300px;
            background: linear-gradient(135deg, var(--verde), var(--cor-form));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            border: 1px solid var(--cor-borda);
        }

        /* FILTROS */
        .filters-section {
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .form-control, .form-select {
            background-color: var(--cor-input-bg);
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
        }

        .form-control::placeholder {
            color: var(--cor-placeholder);
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--cor-input-bg);
            border-color: var(--verde);
            color: var(--cor-texto);
            box-shadow: 0 0 0 0.2rem rgba(46, 204, 113, 0.25);
        }

        /* CARDS DE JOGADORES */
        .player-card {
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .player-card:hover {
            border-color: var(--verde);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2);
        }

        .player-flag {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .player-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--verde);
            margin-bottom: 0.5rem;
        }

        .player-info {
            font-size: 0.9rem;
            color: var(--cor-texto-muted);
            margin: 0.3rem 0;
        }

        .player-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background-color: var(--verde);
            color: var(--cor-form);
            font-weight: 600;
        }

        .btn-edit:hover {
            background-color: var(--verde-hover);
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            font-weight: 600;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        /* BOTÃO ADICIONAR */
        .btn-add-player {
            background: linear-gradient(to left, var(--verde), var(--cor-form));
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        .btn-add-player:hover {
            background: linear-gradient(to left, var(--verde-hover), var(--cor-form));
            color: var(--cor-texto);
        }

        /* MODAL */
        .modal-content {
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
        }

        .modal-header {
            border-bottom: 1px solid var(--cor-borda);
        }

        .modal-title {
            color: var(--verde);
            font-weight: 700;
        }

        .btn-close {
            filter: brightness(0) invert(1);
        }

        .modal-footer {
            border-top: 1px solid var(--cor-borda);
        }

        .btn-primary {
            background-color: var(--verde);
            border-color: var(--verde);
        }

        .btn-primary:hover {
            background-color: var(--verde-hover);
            border-color: var(--verde-hover);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
        }

        .btn-secondary:hover {
            background-color: var(--cor-input-bg);
            border-color: var(--verde);
        }

        /* PERFIL */
        .profile-section {
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .profile-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .profile-data {
            flex: 1;
            min-width: 250px;
        }

        .profile-data p {
            margin: 0.5rem 0;
            color: var(--cor-texto-muted);
        }

        .profile-data strong {
            color: var(--verde);
        }

        .btn-edit-profile {
            background-color: var(--verde);
            color: var(--cor-form);
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit-profile:hover {
            background-color: var(--verde-hover);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--cor-texto-muted);
        }

        .empty-state h3 {
            color: var(--verde);
            margin-bottom: 1rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .carousel-item {
                height: 200px;
                font-size: 1.5rem;
            }

            .player-card {
                margin-bottom: 1rem;
            }

            .profile-info {
                flex-direction: column;
            }

            .navbar-brand {
                font-size: 1.2rem;
            }
        }

        /* CONFIRMAÇÃO DE EXCLUSÃO */
        .modal-confirm {
            background-color: var(--cor-form);
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
        }

        .modal-confirm-header {
            border-bottom: 1px solid var(--cor-borda);
            padding: 1.5rem;
        }

        .modal-confirm-body {
            padding: 1.5rem;
            color: var(--cor-texto);
        }

        .modal-confirm-footer {
            border-top: 1px solid var(--cor-borda);
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn-confirm {
            background-color: #e74c3c;
            color: white;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirm:hover {
            background-color: #c0392b;
        }

        .btn-cancel {
            background-color: transparent;
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
            padding: 0.6rem 1.5rem;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background-color: var(--cor-input-bg);
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <span class="navbar-brand">⚽ CraqueList</span>
            <div class="d-flex gap-3 align-items-center">
                <span class="nav-link mb-0" id="userNameNav">Usuário</span>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>
    </nav>

    <!-- CONTAINER PRINCIPAL -->
    <div class="container mt-5">
        <!-- PERFIL -->
        <div class="profile-section">
            <div class="profile-info">
                <div class="profile-data">
                    <p><strong>Nome:</strong> <span id="profileName">-</span></p>
                    <p><strong>Email:</strong> <span id="profileEmail">-</span></p>
                </div>
                <button class="btn-edit-profile" onclick="openEditProfileModal()">Editar Perfil</button>
            </div>
        </div>

        <!-- CARROSSEL DE SELEÇÕES -->
        <div class="carousel-section">
            <h5 class="mb-3">🌍 Seleções em Destaque</h5>
            <div id="carouselSeleções" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="carouselContent">
                    <!-- Preenchido por JS -->
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselSeleções" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselSeleções" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filters-section">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label">Filtrar por Seleção</label>
                    <select class="form-select" id="filterCountry" onchange="filterPlayers()">
                        <option value="">Todas as Seleções</option>
                    </select>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label">Filtrar por Posição</label>
                    <select class="form-select" id="filterPosition" onchange="filterPlayers()">
                        <option value="">Todas as Posições</option>
                        <option value="Goleiro">Goleiro</option>
                        <option value="Zagueiro">Zagueiro</option>
                        <option value="Lateral">Lateral</option>
                        <option value="Meio-campista">Meio-campista</option>
                        <option value="Atacante">Atacante</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- BOTÃO ADICIONAR -->
        <button class="btn-add-player" onclick="openAddPlayerModal()">+ Adicionar Jogador</button>

        <!-- LISTA DE JOGADORES -->
        <div id="playersList" class="row g-4">
            <!-- Preenchido por JS -->
        </div>
    </div>

    <!-- MODAL ADICIONAR/EDITAR JOGADOR -->
    <div class="modal fade" id="playerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="playerModalTitle">Adicionar Jogador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="playerForm">
                        <div class="mb-3">
                            <label class="form-label">Nome do Jogador</label>
                            <input type="text" class="form-control" id="playerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Seleção</label>
                            <select class="form-select" id="playerCountry" required>
                                <option value="">Selecione uma seleção</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Posição</label>
                            <select class="form-select" id="playerPosition" required>
                                <option value="">Selecione uma posição</option>
                                <option value="Goleiro">Goleiro</option>
                                <option value="Zagueiro">Zagueiro</option>
                                <option value="Lateral">Lateral</option>
                                <option value="Meio-campista">Meio-campista</option>
                                <option value="Atacante">Atacante</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="savePlayer()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDITAR PERFIL -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editProfileForm">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveProfile()">Salvar</button>
                    <button type="button" class="btn btn-danger" onclick="deleteAccount()">Deletar Conta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAÇÃO DE EXCLUSÃO -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-confirm">
                <div class="modal-confirm-header">
                    <h5 class="modal-title">Confirmar Exclusão</h5>
                </div>
                <div class="modal-confirm-body">
                    <p id="confirmDeleteMessage">Tem certeza que deseja deletar este item?</p>
                </div>
                <div class="modal-confirm-footer">
                    <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn-confirm" onclick="confirmDelete()">Deletar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/app.js"></script>
</body>
</html>

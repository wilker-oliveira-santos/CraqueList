<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraqueList | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="ContainerMain">
        <section class="ContainerSectionMain">
            <section class="ContainerImage">
            </section>
            <section>
                <form action="" id="ContainerFormLogin">

                    <img src="../image/logo.png" alt="logo CraqueList" class="logo">

                    <label for="emai">EMAIL:</label>
                    <input type="email" name="email" placeholder="seu@email.com">

                    <label for="senha">SENHA:</label>
                    <input type="password" name="senha" placeholder="Mínimo 6 caracteres">

                    <input type="submit" value="LOGIN" class="buttonLogin">

                    <section class="ContainerExecuteLogin">
                        <p>Não tem uma conta?</p>
                        <a href="../index.html"> Cadastro</a>
                    </section>
                    <script src="../scripts/login.js"></script>
                </form>
            </section>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

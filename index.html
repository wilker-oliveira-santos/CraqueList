<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraqueList | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="ContainerMain">
        <section class="ContainerSectionMain">
            <section class="ContainerImage">
            </section>
            <section>
                <form id="ContainerFormCad">

                    <img src="image/logo.png" alt="logo CraqueList" class="logo">

                    <label for="nome">NOME COMPLETO:</label>
                    <input type="text" name="nome" placeholder="Como você quer ser chamado?">

                    <label for="emai">EMAIL:</label>
                    <input type="email" name="email" placeholder="seu@email.com">

                    <label for="senha">SENHA:</label>
                    <input type="password" name="senha" placeholder="Mínimo 6 caracteres">

                    <input type="submit" value="CADASTRAR" class="buttonCad">

                    <section class="ContainerExecuteLogin">
                        <p>Já tem uma conta?</p>
                        <a href="./pages/login.html">Realizar Login</a>
                    </section>
                    <script src="scripts/cadastro.js"></script>
                </form>
            </section>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
